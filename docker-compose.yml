services:
  # ----------------------------------------------------------------
  # Database (MariaDB 10.11). Tabel toko ada di database `D`,
  # master data + login di database `jwiid_dev`.
  # File SQL di folder ./database otomatis dijalankan saat pertama kali.
  # ----------------------------------------------------------------
  db:
    image: mariadb:10.11
    container_name: portal-toko-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
    ports:
      - "3307:3306"          # akses dari host via 127.0.0.1:3307 (mis. DBeaver)
    volumes:
      - dbdata:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ----------------------------------------------------------------
  # PHP 8.3-FPM (menjalankan kode CodeIgniter)
  # ----------------------------------------------------------------
  app:
    build: .
    container_name: portal-toko-app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy

  # ----------------------------------------------------------------
  # Nginx (web server) -> buka http://localhost:8080
  # ----------------------------------------------------------------
  web:
    image: nginx:1.27-alpine
    container_name: portal-toko-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  dbdata:
